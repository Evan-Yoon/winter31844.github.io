name: Weekly AI News Digest

on:
  schedule:
    - cron: "0 21 * * 0"
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: Asia/Seoul

jobs:
  generate-ai-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Generate weekly AI news posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run ai-news:weekly

      - name: Build site
        run: npm run build

      - name: Commit generated posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/posts/ainews/*.md

          if git diff --cached --quiet; then
            echo "No new weekly AI news posts."
            exit 0
          fi

          git commit -m "auto: generate weekly ai news digest"
          git push
