<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Cloud Practitioner</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #2b2827;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #ffffff;
            text-align: center;
            border-bottom: 3px solid #ff9900;
            padding-bottom: 10px;
        }

        .question-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .question-header {
            color: orange;
            font-size: 1.5rem;
            font-weight: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #16191f;
        }

        .options-container {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background-color: #fff;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: left;
            cursor: pointer;
            font-size: 1rem;
            font-family: system-ui;
            font-weight: bold;
            transition: all 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #aaa;
        }

        .option-btn.selected {
            border-color: #ff9900;
            background-color: #fffaf0;
        }

        .option-btn.correct {
            background-color: #e7f4e4 !important;
            border-color: #2e7d32 !important;
            color: #1b5e20 !important;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: #fdecea !important;
            border-color: #d32f2f !important;
            color: #c62828 !important;
        }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            background-color: #fff9e6;
            border-left: 5px solid #ff9900;
            border-radius: 4px;
            display: none;
        }

        /* 페이지네이션 버튼 스타일 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .page-btn {
            padding: 10px 20px;
            background-color: #232f3e;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .page-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* 플로팅 버튼 공통 스타일 */
        .floating-btn {
            position: fixed;
            right: 30px;
            width: 50px;
            height: 50px;
            background-color: #ff9900;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 맨 위로 가는 버튼 위치 (오른쪽 위) */
        #scroll-top-btn {
            top: 30px;
        }

        /* 맨 아래로 가는 버튼 위치 (오른쪽 아래) */
        #scroll-bottom-btn {
            bottom: 30px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>AWS Cloud Practitioner Exam 10</h1>
        <div id="quiz-container"></div>

        <div class="pagination">
            <button class="page-btn" id="prev-btn" onclick="changePage(-1)">이전 페이지</button>
            <button class="page-btn" id="next-btn" onclick="changePage(1)">다음 페이지</button>
        </div>
    </div>

    <!-- 맨 위로 가기 버튼 -->
    <button id="scroll-top-btn" class="floating-btn" aria-label="맨 위로">↑</button>

    <!-- 맨 아래로 가기 버튼 -->
    <button id="scroll-bottom-btn" class="floating-btn" aria-label="맨 아래로">↓</button>

                required: 1,
                options: [
                    { text: "AWS가 테이블에 저장된 데이터를 직접 관리함", isCorrect: false },
                    { text: "AWS가 운영 체제의 유지 관리를 관리함", isCorrect: true },
                    { text: "AWS가 수요에 따라 인스턴스 유형을 자동으로 수직 확장함", isCorrect: false },

                ],
                explanation: "RDS는 서비스 제공업체인 AWS가 하위 OS 패치, 하드웨어 유지 관리 등을 대신 처리해줍니다."
            },
            {
                id: 46,
                text: "한 구성 요소가 고장 나면 전체 웹 앱이 고장 나는 문제를 해결하기 위해 적용해야 할 클라우드 설계 원칙은?",
                required: 1,
                options: [
                    { text: "수요 변화에 따라 확장 가능한 탄력성 구현", isCorrect: false },
                    { text: "더 나은 성능을 위해 여러 EC2를 병렬 실행", isCorrect: false },
                    { text: "구성 요소를 고립시켜 독립적으로 작동하게 하는 분리(Decoupling)에 집중", isCorrect: true },
                    { text: "결함 허용을 위해 EC2 리소스를 두 배로 늘림", isCorrect: false }
                ],
                explanation: "구성 요소 간의 종속성을 줄이는 디커플링(Decoupling)을 통해 특정 부분의 장애가 전체로 번지는 것을 막을 수 있습니다."
            },
            {

                required: 1,
                options: [
                    { text: "AWS 파트너 네트워크 기술 파트너", isCorrect: false },

                ],
                explanation: "APN 컨설팅 파트너는 고객의 AWS 클라우드 설계, 구축 및 마이그레이션을 돕는 전문 서비스 업체들입니다."

            {

                text: "객체를 저장하고 이에 대한 실시간 액세스를 제공하며 버전 관리 및 수명 주기 기능을 제공하는 서비스는?",
                required: 1,
                options: [
                    { text: "Amazon Glacier", isCorrect: false },
                    { text: "AWS Storage Gateway", isCorrect: false },
                    { text: "Amazon S3", isCorrect: true },
                    { text: "Amazon EBS", isCorrect: false }
                ],
                explanation: "S3는 고가용성 객체 스토리지로, 데이터 버전 관리와 오래된 데이터를 자동 삭제/이동하는 수명 주기 정책을 제공합니다."

            {
                id: 49,
                text: "여러 가용 영역(AZ)에 워크로드를 분산하는 것은 어떤 설계 원칙을 지원합니까?",
                required: 1,
                options: [
                    { text: "자동화 구현", isCorrect: false },
                    { text: "민첩성을 고려한 설계", isCorrect: false },
                    { text: "장애를 대비한 설계 (Design for failure)", isCorrect: true },
                    { text: "탄력성 구현", isCorrect: false }
                ],
                explanation: "하나의 가용 영역에 장애가 발생하더라도 서비스가 유지되도록 설계하는 것은 클라우드의 핵심 가용성 원칙입니다."
            },
            {
                id: 50,
                text: "여러 AWS 계정을 통합하고 중앙에서 관리하기 위해 고객이 사용해야 하는 서비스는?",
                required: 1,
                options: [
                    { text: "AWS IAM", isCorrect: false },
                    { text: "AWS Organizations", isCorrect: true },
                    { text: "AWS Schema Conversion Tool", isCorrect: false },
                    { text: "AWS Config", isCorrect: false }
                ],
                explanation: "AWS Organizations는 여러 계정을 계층 구조로 묶어 정책 기반 관리와 통합 빌링을 가능하게 합니다."
            }
        ];

        // 상태 관리
        let currentPage = 1;
        const questionsPerPage = 10;
        const userSelections = {}; // 유저가 선택한 버튼 인덱스 저장
        const revealedQuestions = new Set(); // 정답이 공개된 문제 번호 저장

        // 배열 섞기 함수 (Fisher-Yates)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 초기 실행: 각 문제의 보기를 무작위로 섞음
        questionsData.forEach(q => {
            shuffleArray(q.options);
        });

        // 퀴즈 렌더링 함수
        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            const start = (currentPage - 1) * questionsPerPage;
            const end = start + questionsPerPage;
            const currentQuestions = questionsData.slice(start, end);

            currentQuestions.forEach((q, qIndex) => {
                const absoluteIndex = start + qIndex;
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q-${q.id}`;

                const isRevealed = revealedQuestions.has(q.id);

                // 헤더
                const header = document.createElement('div');
                header.className = 'question-header';
                header.innerHTML = `<span>🍧 문제 ${q.id}</span>`;
                card.appendChild(header);

                // 질문
                const text = document.createElement('div');
                text.className = 'question-text';
                text.innerText = q.text;
                card.appendChild(text);

                // 보기 컨테이너
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options-container';

                const labels = ['A', 'B', 'C', 'D', 'E'];
                q.options.forEach((opt, optIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = `${labels[optIndex]}. ${opt.text}`;

                    // 이미 선택했거나 공개된 상태에 따른 스타일 적용
                    if (userSelections[q.id] && userSelections[q.id].includes(optIndex)) {
                        btn.classList.add('selected');
                    }

                    if (isRevealed) {
                        btn.disabled = true;
                        if (opt.isCorrect) btn.classList.add('correct');
                        else if (userSelections[q.id] && userSelections[q.id].includes(optIndex)) {
                            btn.classList.add('wrong');
                        }
                    } else {
                        btn.onclick = () => handleSelect(btn, q.id, optIndex, q.required);
                    }

                    optionsDiv.appendChild(btn);
                });
                card.appendChild(optionsDiv);

                // 해설
                const exp = document.createElement('div');
                exp.className = 'explanation';
                exp.id = `exp-${q.id}`;
                exp.innerHTML = `<span class="correct-label">해설:</span>${q.explanation}`;
                if (isRevealed) exp.style.display = 'block';
                card.appendChild(exp);

                container.appendChild(card);
            });

            // 버튼 상태 업데이트
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = end >= questionsData.length;
        }

        // 보기 선택 처리
        function handleSelect(btn, qId, optIndex, required) {
            if (!userSelections[qId]) userSelections[qId] = [];

            // 이미 선택된 것이면 취소 (다중 선택일 경우 대비)
            if (userSelections[qId].includes(optIndex)) {
                userSelections[qId] = userSelections[qId].filter(i => i !== optIndex);
                btn.classList.remove('selected');
            } else {
                // 최대 선택 개수 제한
                if (userSelections[qId].length < required) {
                    userSelections[qId].push(optIndex);
                    btn.classList.add('selected');
                }
            }

            // 필요한 개수만큼 선택했다면 정답 공개
            if (userSelections[qId].length === required) {
                revealedQuestions.add(qId);
                setTimeout(renderQuiz, 300); // 부드러운 전환을 위해 약간의 지연 후 리렌더링
            }
        }

        // 페이지 변경
        function changePage(direction) {
            currentPage += direction;
            renderQuiz();
            window.scrollTo(0, 0);
        }

        // 첫 렌더링
        renderQuiz();

        // 맨 위로 가기 기능
        document.getElementById('scroll-top-btn').addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth' // 부드러운 스크롤
            });
        });

        // 맨 아래로 가기 기능
        document.getElementById('scroll-bottom-btn').addEventListener('click', () => {
            window.scrollTo({
                top: document.body.scrollHeight, // 문서 전체 높이만큼 스크롤
                behavior: 'smooth'
            });
        });
    </script>
