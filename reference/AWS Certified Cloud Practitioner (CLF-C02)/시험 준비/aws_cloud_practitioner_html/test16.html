<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Cloud Practitioner</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #2b2827;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #ffffff;
            text-align: center;
            border-bottom: 3px solid #ff9900;
            padding-bottom: 10px;
        }

        .question-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .question-header {
            color: orange;
            font-size: 1.5rem;
            font-weight: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #16191f;
        }

        .options-container {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background-color: #fff;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: left;
            cursor: pointer;
            font-size: 1rem;
            font-family: system-ui;
            font-weight: bold;
            transition: all 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #aaa;
        }

        .option-btn.selected {
            border-color: #ff9900;
            background-color: #fffaf0;
        }

        .option-btn.correct {
            background-color: #e7f4e4 !important;
            border-color: #2e7d32 !important;
            color: #1b5e20 !important;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: #fdecea !important;
            border-color: #d32f2f !important;
            color: #c62828 !important;
        }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            background-color: #fff9e6;
            border-left: 5px solid #ff9900;
            border-radius: 4px;
            display: none;
        }

        /* 페이지네이션 버튼 스타일 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .page-btn {
            padding: 10px 20px;
            background-color: #232f3e;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .page-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* 플로팅 버튼 공통 스타일 */
        .floating-btn {
            position: fixed;
            right: 30px;
            width: 50px;
            height: 50px;
            background-color: #ff9900;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 맨 위로 가는 버튼 위치 (오른쪽 위) */
        #scroll-top-btn {
            top: 30px;
        }

        /* 맨 아래로 가는 버튼 위치 (오른쪽 아래) */
        #scroll-bottom-btn {
            bottom: 30px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>AWS Cloud Practitioner Exam 16</h1>
        <div id="quiz-container"></div>

        <div class="pagination">
            <button class="page-btn" id="prev-btn" onclick="changePage(-1)">이전 페이지</button>
            <button class="page-btn" id="next-btn" onclick="changePage(1)">다음 페이지</button>
        </div>
    </div>

    <!-- 맨 위로 가기 버튼 -->
    <button id="scroll-top-btn" class="floating-btn" aria-label="맨 위로">↑</button>

    <!-- 맨 아래로 가기 버튼 -->
    <button id="scroll-bottom-btn" class="floating-btn" aria-label="맨 아래로">↓</button>

                required: 1,
                options: [

            {

                text: "분산 서비스 거부(DDoS) 완화 기능이 있는 서비스는 무엇입니까? (2개 선택)",
                required: 2,
                options: [
                    { text: "AWS WAF", isCorrect: true },

                    { text: "Amazon Inspector", isCorrect: false }
                ],
                explanation: "WAF는 웹 계층의 공격을 차단하고, CloudFront는 대규모 트래픽 분산을 통해 DDoS 방어에 기여합니다."
            },
            {
                id: 50,
                text: "클라우드 총 소유 비용(TCO) 모델을 구축할 때 AWS 워크로드에 대해 고려해야 할 비용 요소는 무엇입니까? (3개 선택)",
                required: 3,
                options: [
                    { text: "컴퓨팅 비용", isCorrect: true },
                    { text: "시설 관리 비용 (전력, 냉각 등)", isCorrect: false },
                    { text: "스토리지 비용", isCorrect: true },
                    { text: "데이터 전송 비용", isCorrect: true },
                    { text: "네트워크 인프라 설치 비용", isCorrect: false },
                    { text: "하드웨어 수명 주기 관리 비용", isCorrect: false }
                ],
                explanation: "시설 관리 및 하드웨어 유지 비용은 AWS가 부담하므로, 고객은 실제 사용하는 컴퓨팅, 스토리지, 데이터 전송 비용을 고려해야 합니다."
            }
        ];

        // 상태 관리
        let currentPage = 1;
        const questionsPerPage = 10;
        const userSelections = {}; // 유저가 선택한 버튼 인덱스 저장
        const revealedQuestions = new Set(); // 정답이 공개된 문제 번호 저장

        // 배열 섞기 함수 (Fisher-Yates)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 초기 실행: 각 문제의 보기를 무작위로 섞음
        questionsData.forEach(q => {
            shuffleArray(q.options);
        });

        // 퀴즈 렌더링 함수
        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            const start = (currentPage - 1) * questionsPerPage;
            const end = start + questionsPerPage;
            const currentQuestions = questionsData.slice(start, end);

            currentQuestions.forEach((q, qIndex) => {
                const absoluteIndex = start + qIndex;
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q-${q.id}`;

                const isRevealed = revealedQuestions.has(q.id);

                // 헤더
                const header = document.createElement('div');
                header.className = 'question-header';
                header.innerHTML = `<span>🍧 문제 ${q.id}</span>`;
                card.appendChild(header);

                // 질문
                const text = document.createElement('div');
                text.className = 'question-text';
                text.innerText = q.text;
                card.appendChild(text);

                // 보기 컨테이너
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options-container';

                const labels = ['A', 'B', 'C', 'D', 'E'];
                q.options.forEach((opt, optIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = `${labels[optIndex]}. ${opt.text}`;

                    // 이미 선택했거나 공개된 상태에 따른 스타일 적용
                    if (userSelections[q.id] && userSelections[q.id].includes(optIndex)) {
                        btn.classList.add('selected');
                    }

                    if (isRevealed) {
                        btn.disabled = true;
                        if (opt.isCorrect) btn.classList.add('correct');
                        else if (userSelections[q.id] && userSelections[q.id].includes(optIndex)) {
                            btn.classList.add('wrong');
                        }
                    } else {
                        btn.onclick = () => handleSelect(btn, q.id, optIndex, q.required);
                    }

                    optionsDiv.appendChild(btn);
                });
                card.appendChild(optionsDiv);

                // 해설
                const exp = document.createElement('div');
                exp.className = 'explanation';
                exp.id = `exp-${q.id}`;
                exp.innerHTML = `<span class="correct-label">해설:</span>${q.explanation}`;
                if (isRevealed) exp.style.display = 'block';
                card.appendChild(exp);

                container.appendChild(card);
            });

            // 버튼 상태 업데이트
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = end >= questionsData.length;
        }

        // 보기 선택 처리
        function handleSelect(btn, qId, optIndex, required) {
            if (!userSelections[qId]) userSelections[qId] = [];

            // 이미 선택된 것이면 취소 (다중 선택일 경우 대비)
            if (userSelections[qId].includes(optIndex)) {
                userSelections[qId] = userSelections[qId].filter(i => i !== optIndex);
                btn.classList.remove('selected');
            } else {
                // 최대 선택 개수 제한
                if (userSelections[qId].length < required) {
                    userSelections[qId].push(optIndex);
                    btn.classList.add('selected');
                }
            }

            // 필요한 개수만큼 선택했다면 정답 공개
            if (userSelections[qId].length === required) {
                revealedQuestions.add(qId);
                setTimeout(renderQuiz, 300); // 부드러운 전환을 위해 약간의 지연 후 리렌더링
            }
        }

        // 페이지 변경
        function changePage(direction) {
            currentPage += direction;
            renderQuiz();
            window.scrollTo(0, 0);
        }

        // 첫 렌더링
        renderQuiz();

        // 맨 위로 가기 기능
        document.getElementById('scroll-top-btn').addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth' // 부드러운 스크롤
            });
        });

        // 맨 아래로 가기 기능
        document.getElementById('scroll-bottom-btn').addEventListener('click', () => {
            window.scrollTo({
                top: document.body.scrollHeight, // 문서 전체 높이만큼 스크롤
                behavior: 'smooth'
            });
        });
    </script>
