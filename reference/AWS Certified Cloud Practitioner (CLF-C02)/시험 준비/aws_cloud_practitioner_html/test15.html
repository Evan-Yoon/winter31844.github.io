<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Cloud Practitioner</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #2b2827;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #ffffff;
            text-align: center;
            border-bottom: 3px solid #ff9900;
            padding-bottom: 10px;
        }

        .question-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .question-header {
            color: orange;
            font-size: 1.5rem;
            font-weight: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #16191f;
        }

        .options-container {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background-color: #fff;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: left;
            cursor: pointer;
            font-size: 1rem;
            font-family: system-ui;
            font-weight: bold;
            transition: all 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #aaa;
        }

        .option-btn.selected {
            border-color: #ff9900;
            background-color: #fffaf0;
        }

        .option-btn.correct {
            background-color: #e7f4e4 !important;
            border-color: #2e7d32 !important;
            color: #1b5e20 !important;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: #fdecea !important;
            border-color: #d32f2f !important;
            color: #c62828 !important;
        }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            background-color: #fff9e6;
            border-left: 5px solid #ff9900;
            border-radius: 4px;
            display: none;
        }

        /* 페이지네이션 버튼 스타일 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .page-btn {
            padding: 10px 20px;
            background-color: #232f3e;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .page-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* 플로팅 버튼 공통 스타일 */
        .floating-btn {
            position: fixed;
            right: 30px;
            width: 50px;
            height: 50px;
            background-color: #ff9900;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 맨 위로 가는 버튼 위치 (오른쪽 위) */
        #scroll-top-btn {
            top: 30px;
        }

        /* 맨 아래로 가는 버튼 위치 (오른쪽 아래) */
        #scroll-bottom-btn {
            bottom: 30px;
        }
    </style>
</head>

                required: 2,
                options: [

                    { text: "사용량이 적은 EC2 인스턴스로 트래픽 자동 전송", isCorrect: false },

                ],
                explanation: "수요에 따라 리소스를 유연하게 늘리거나(Scale-out) 크기를 조정(Scale-up)하는 것이 탄력성의 핵심입니다."
            },
            {
                id: 46,
                text: "회사가 스팟 인스턴스(Spot Instance)를 사용하는 것이 유익한 경우는 언제입니까?",
                required: 1,
                options: [
                    { text: "애플리케이션 실행 시간에 유연성이 있을 때", isCorrect: true },
                    { text: "미션 크리티컬한 워크로드가 있을 때", isCorrect: false },
                    { text: "전용 용량이 필요할 때", isCorrect: false },
                    { text: "인스턴스가 중지되어서는 안 될 때", isCorrect: false }
                ],
                explanation: "스팟 인스턴스는 저렴한 대신 중단될 수 있으므로, 실행 시간에 제약이 없는 유연한 작업에 적합합니다."
            },
            {
                id: 47,
                text: "온프레미스 데이터 센터를 AWS로 이전하려는 회사가 총 소유 비용(TCO) 분석에 포함해야 할 요소는? (2개 선택)",
                required: 2,
                options: [
                    { text: "Amazon EC2 인스턴스 가용성", isCorrect: false },
                    { text: "데이터 센터의 전력 소비", isCorrect: true },
                    { text: "오래된 서버를 교체하기 위한 인건비", isCorrect: true },
                    { text: "애플리케이션 개발자 시간", isCorrect: false },
                    { text: "데이터베이스 엔진 용량", isCorrect: false }
                ],
                explanation: "전력비, 냉각비, 시설 관리 인건비 등은 온프레미스에서 클라우드로 이동 시 절감되는 주요 비용 요소입니다."
            },
            {
                id: 48,
                text: "AWS는 AWS Lambda 요금을 어떻게 청구합니까?",
                required: 1,
                options: [
                    { text: "사용자가 시간당 지불 의사가 있는 최대 가격 입찰", isCorrect: false },

                    { text: "데이터베이스의 영구 스토리지 사용량에 대해 지불", isCorrect: false },
                    { text: "요청 수와 소비된 컴퓨팅 리소스(실행 시간)를 기반으로 지불", isCorrect: true }
                ],
                explanation: "Lambda는 함수 호출 횟수와 실행 시간(Memory/Time)에 대해서만 비용을 지불하는 대표적인 이벤트 기반 요금제입니다."
            },
            {
                id: 49,
                text: "보안 그룹(Security groups)은 Amazon EC2 인스턴스 보안과 관련하여 어떤 기능을 합니까?",
                required: 1,
                options: [
                    { text: "Amazon EC2 인스턴스를 위한 가상 방화벽 역할", isCorrect: true },
                    { text: "IAM 정책을 통한 사용자 계정 보호", isCorrect: false },
                    { text: "AWS Shield를 통한 DDoS 보호 제공", isCorrect: false },
                    { text: "Amazon CloudFront를 사용하여 인스턴스 보호", isCorrect: false }
                ],
                explanation: "보안 그룹은 인스턴스 단위로 인바운드 및 아웃바운드 트래픽을 제어하는 가상 방화벽입니다."
            },
            {
                id: 50,
                text: "다운타임(장애 시간) 가능성이 가장 낮은 재해 복구(DR) 시나리오는 무엇입니까?",
                required: 1,
                options: [
                    { text: "백업 및 복구", isCorrect: false },
                    { text: "파일럿 라이트 (Pilot light)", isCorrect: false },
                    { text: "웜 스탠바이 (Warm standby)", isCorrect: false },
                    { text: "멀티 사이트 액티브-액티브 (Multi-site active-active)", isCorrect: true }
                ],
                explanation: "여러 지리적 위치에서 동시에 서비스를 가동하는 액티브-액티브 방식은 장애 시 즉각적인 전환이 가능하여 다운타임이 거의 없습니다."
            }
        ];

        // 상태 관리
        let currentPage = 1;
        const questionsPerPage = 10;
        const userSelections = {}; // 유저가 선택한 버튼 인덱스 저장
        const revealedQuestions = new Set(); // 정답이 공개된 문제 번호 저장

        // 배열 섞기 함수 (Fisher-Yates)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 초기 실행: 각 문제의 보기를 무작위로 섞음
        questionsData.forEach(q => {
            shuffleArray(q.options);
        });

        // 퀴즈 렌더링 함수
        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            const start = (currentPage - 1) * questionsPerPage;
            const end = start + questionsPerPage;
            const currentQuestions = questionsData.slice(start, end);

            currentQuestions.forEach((q, qIndex) => {
                const absoluteIndex = start + qIndex;
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q-${q.id}`;

                const isRevealed = revealedQuestions.has(q.id);

                // 헤더
                const header = document.createElement('div');
                header.className = 'question-header';
                header.innerHTML = `<span>🍧 문제 ${q.id}</span>`;
                card.appendChild(header);

                // 질문
                const text = document.createElement('div');
                text.className = 'question-text';
                text.innerText = q.text;
                card.appendChild(text);

                // 보기 컨테이너
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options-container';

                const labels = ['A', 'B', 'C', 'D', 'E'];
                q.options.forEach((opt, optIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = `${labels[optIndex]}. ${opt.text}`;

                    // 이미 선택했거나 공개된 상태에 따른 스타일 적용
                    if (userSelections[q.id] && userSelections[q.id].includes(optIndex)) {
                        btn.classList.add('selected');
                    }

                    if (isRevealed) {
                        btn.disabled = true;
                        if (opt.isCorrect) btn.classList.add('correct');
                        else if (userSelections[q.id] && userSelections[q.id].includes(optIndex)) {
                            btn.classList.add('wrong');
                        }
                    } else {
                        btn.onclick = () => handleSelect(btn, q.id, optIndex, q.required);
                    }

                    optionsDiv.appendChild(btn);
                });
                card.appendChild(optionsDiv);

                // 해설
                const exp = document.createElement('div');
                exp.className = 'explanation';
                exp.id = `exp-${q.id}`;
                exp.innerHTML = `<span class="correct-label">해설:</span>${q.explanation}`;
                if (isRevealed) exp.style.display = 'block';
                card.appendChild(exp);

                container.appendChild(card);
            });

            // 버튼 상태 업데이트
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = end >= questionsData.length;
        }

        // 보기 선택 처리
        function handleSelect(btn, qId, optIndex, required) {
            if (!userSelections[qId]) userSelections[qId] = [];

            // 이미 선택된 것이면 취소 (다중 선택일 경우 대비)
            if (userSelections[qId].includes(optIndex)) {
                userSelections[qId] = userSelections[qId].filter(i => i !== optIndex);
                btn.classList.remove('selected');
            } else {
                // 최대 선택 개수 제한
                if (userSelections[qId].length < required) {
                    userSelections[qId].push(optIndex);
                    btn.classList.add('selected');
                }
            }

            // 필요한 개수만큼 선택했다면 정답 공개
            if (userSelections[qId].length === required) {
                revealedQuestions.add(qId);
                setTimeout(renderQuiz, 300); // 부드러운 전환을 위해 약간의 지연 후 리렌더링
            }
        }

        // 페이지 변경
        function changePage(direction) {
            currentPage += direction;
            renderQuiz();
            window.scrollTo(0, 0);
        }

        // 첫 렌더링
        renderQuiz();

        // 맨 위로 가기 기능
        document.getElementById('scroll-top-btn').addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth' // 부드러운 스크롤
            });
        });

        // 맨 아래로 가기 기능
        document.getElementById('scroll-bottom-btn').addEventListener('click', () => {
            window.scrollTo({
                top: document.body.scrollHeight, // 문서 전체 높이만큼 스크롤
                behavior: 'smooth'
            });
        });
    </script>
