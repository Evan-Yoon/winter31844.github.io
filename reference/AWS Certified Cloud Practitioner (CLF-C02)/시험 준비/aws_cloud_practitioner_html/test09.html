<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Cloud Practitioner</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #2b2827;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #ffffff;
            text-align: center;
            border-bottom: 3px solid #ff9900;
            padding-bottom: 10px;
        }

        .question-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .question-header {
            color: orange;
            font-size: 1.5rem;
            font-weight: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #16191f;
        }

        .options-container {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background-color: #fff;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: left;
            cursor: pointer;
            font-size: 1rem;
            font-family: system-ui;
            font-weight: bold;
            transition: all 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #aaa;
        }

        .option-btn.selected {
            border-color: #ff9900;
            background-color: #fffaf0;
        }

        .option-btn.correct {
            background-color: #e7f4e4 !important;
            border-color: #2e7d32 !important;
            color: #1b5e20 !important;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: #fdecea !important;
            border-color: #d32f2f !important;
            color: #c62828 !important;
        }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            background-color: #fff9e6;
            border-left: 5px solid #ff9900;
            border-radius: 4px;
            display: none;
        }

        /* 페이지네이션 버튼 스타일 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .page-btn {
            padding: 10px 20px;
            background-color: #232f3e;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .page-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* 플로팅 버튼 공통 스타일 */
        .floating-btn {
            position: fixed;
            right: 30px;
            width: 50px;
            height: 50px;
            background-color: #ff9900;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 맨 위로 가는 버튼 위치 (오른쪽 위) */
        #scroll-top-btn {
            top: 30px;
        }

        /* 맨 아래로 가는 버튼 위치 (오른쪽 아래) */
        #scroll-bottom-btn {
            bottom: 30px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>AWS Cloud Practitioner Exam 9</h1>
        <div id="quiz-container"></div>

        <div class="pagination">
            <button class="page-btn" id="prev-btn" onclick="changePage(-1)">이전 페이지</button>
            <button class="page-btn" id="next-btn" onclick="changePage(1)">다음 페이지</button>
        </div>
    </div>

    <!-- 맨 위로 가기 버튼 -->
    <button id="scroll-top-btn" class="floating-btn" aria-label="맨 위로">↑</button>

    <!-- 맨 아래로 가기 버튼 -->
    <button id="scroll-bottom-btn" class="floating-btn" aria-label="맨 아래로">↓</button>

                    { text: "유입되는 애플리케이션 트래픽을 하나 이상의 EC2 인스턴스로 분산함", isCorrect: true },
                    { text: "연결된 EC2 인스턴스의 지표를 수집함", isCorrect: false },
                    { text: "인입 트래픽에 맞춰 EC2 인스턴스 수를 자동으로 조절함", isCorrect: false }
                ],
                explanation: "ELB의 핵심 역할은 여러 대상(EC2, 컨테이너 등)에 부하를 골고루 분산하여 성능과 안정성을 높이는 것입니다."
            },
            {
                id: 45,
                text: "다음 중 빠르고 안정적인 NoSQL 데이터베이스 서비스는 무엇입니까?",
                required: 1,
                options: [
                    { text: "Amazon Redshift", isCorrect: false },
                    { text: "Amazon RDS", isCorrect: false },
                    { text: "Amazon DynamoDB", isCorrect: true },
                    { text: "Amazon S3", isCorrect: false }
                ],
                explanation: "Amazon DynamoDB는 규모에 상관없이 10밀리초 미만의 성능을 제공하는 완전 관리형 NoSQL 데이터베이스입니다."
            },
            {
                id: 46,
                text: "규정 준수 보고서(ISO, SOC 등) 및 인증서를 얻기 위해 어떤 AWS 서비스를 사용해야 합니까?",
                required: 1,
                options: [
                    { text: "AWS Artifact", isCorrect: true },
                    { text: "AWS Lambda", isCorrect: false },
                    { text: "Amazon Inspector", isCorrect: false },
                    { text: "AWS Certificate Manager", isCorrect: false }
                ],
                explanation: "AWS Artifact는 AWS가 획득한 각종 보안 규정 준수 문서를 고객이 직접 다운로드할 수 있는 서비스입니다."
            },
            {
                id: 47,
                text: "지역(Regional) 서비스가 아닌 글로벌(Global) 서비스로 정의되는 것은 무엇입니까? (2개 선택)",
                required: 2,
                options: [
                    { text: "Amazon Route 53", isCorrect: true },
                    { text: "Amazon EC2", isCorrect: false },
                    { text: "Amazon S3", isCorrect: false },
                    { text: "Amazon CloudFront", isCorrect: true },
                    { text: "Amazon DynamoDB", isCorrect: false }
                ],
                explanation: "Route 53(DNS)과 CloudFront(CDN)는 특정 리전에 국한되지 않고 전 세계 네트워크 인프라를 통해 제공되는 글로벌 서비스입니다."
            },
            {
                id: 48,
                text: "AWS 고객이 대규모 사용자 그룹에게 공통된 액세스 제어를 쉽게 적용하는 방법은 무엇입니까?",
                required: 1,
                options: [
                    { text: "IAM 그룹에 IAM 정책을 적용함", isCorrect: true },
                    { text: "IAM 역할에 IAM 정책을 적용함", isCorrect: false },
                    { text: "동일한 업무를 하는 모든 사용자에게 일일이 동일 정책 부착", isCorrect: false },
                    { text: "Amazon Cognito 사용자 풀에 IAM 정책 적용", isCorrect: false }
                ],
                explanation: "사용자들을 그룹으로 묶고 해당 그룹에 정책을 부여하면, 그룹에 속한 모든 사용자에게 권한이 일괄 적용되어 관리가 편리합니다."
            },
            {
                id: 49,
                text: "클라우드 애플리케이션 설계 시 중요한 아키텍처 설계 원칙은 무엇입니까?",
                required: 1,
                options: [
                    { text: "여러 가용 영역 (Availability Zones) 사용", isCorrect: true },
                    { text: "밀접하게 결합된 구성 요소 사용", isCorrect: false },
                    { text: "오픈 소스 소프트웨어만 사용", isCorrect: false },
                    { text: "여분의 용량을 미리 고정 확보", isCorrect: false }
                ],
                explanation: "여러 가용 영역에 걸쳐 시스템을 구축하는 것은 단일 장애 지점을 제거하고 복원력을 확보하기 위한 핵심 원칙입니다."
            },
            {
                id: 50,
                text: "여러 AWS 계정을 가진 회사가 사용량을 합산하여 볼륨 할인을 받을 수 있게 해주는 서비스는?",
                required: 1,
                options: [
                    { text: "AWS Server Migration Service", isCorrect: false },
                    { text: "AWS Organizations", isCorrect: true },
                    { text: "AWS Budgets", isCorrect: false },
                    { text: "AWS Trusted Advisor", isCorrect: false }
                ],
                explanation: "AWS Organizations의 통합 빌링 기능을 통해 여러 계정의 사용량을 하나로 묶어 결제함으로써 볼륨 할인 혜택을 누릴 수 있습니다."
            }
        ];

        // 상태 관리
        let currentPage = 1;
        const questionsPerPage = 10;
        const userSelections = {}; // 유저가 선택한 버튼 인덱스 저장
        const revealedQuestions = new Set(); // 정답이 공개된 문제 번호 저장

        // 배열 섞기 함수 (Fisher-Yates)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 초기 실행: 각 문제의 보기를 무작위로 섞음
        questionsData.forEach(q => {
            shuffleArray(q.options);
        });

        // 퀴즈 렌더링 함수
        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            const start = (currentPage - 1) * questionsPerPage;
            const end = start + questionsPerPage;
            const currentQuestions = questionsData.slice(start, end);

            currentQuestions.forEach((q, qIndex) => {
                const absoluteIndex = start + qIndex;
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q-${q.id}`;

                const isRevealed = revealedQuestions.has(q.id);

                // 헤더
                const header = document.createElement('div');
                header.className = 'question-header';
                header.innerHTML = `<span>🍧 문제 ${q.id}</span>`;
                card.appendChild(header);

                // 질문
                const text = document.createElement('div');
                text.className = 'question-text';
                text.innerText = q.text;
                card.appendChild(text);

                // 보기 컨테이너
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options-container';

                const labels = ['A', 'B', 'C', 'D', 'E'];
                q.options.forEach((opt, optIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = `${labels[optIndex]}. ${opt.text}`;

                    // 이미 선택했거나 공개된 상태에 따른 스타일 적용
                    if (userSelections[q.id] && userSelections[q.id].includes(optIndex)) {
                        btn.classList.add('selected');
                    }

                    if (isRevealed) {
                        btn.disabled = true;
                        if (opt.isCorrect) btn.classList.add('correct');
                        else if (userSelections[q.id] && userSelections[q.id].includes(optIndex)) {
                            btn.classList.add('wrong');
                        }
                    } else {
                        btn.onclick = () => handleSelect(btn, q.id, optIndex, q.required);
                    }

                    optionsDiv.appendChild(btn);
                });
                card.appendChild(optionsDiv);

                // 해설
                const exp = document.createElement('div');
                exp.className = 'explanation';
                exp.id = `exp-${q.id}`;
                exp.innerHTML = `<span class="correct-label">해설:</span>${q.explanation}`;
                if (isRevealed) exp.style.display = 'block';
                card.appendChild(exp);

                container.appendChild(card);
            });

            // 버튼 상태 업데이트
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = end >= questionsData.length;
        }

        // 보기 선택 처리
        function handleSelect(btn, qId, optIndex, required) {
            if (!userSelections[qId]) userSelections[qId] = [];

            // 이미 선택된 것이면 취소 (다중 선택일 경우 대비)
            if (userSelections[qId].includes(optIndex)) {
                userSelections[qId] = userSelections[qId].filter(i => i !== optIndex);
                btn.classList.remove('selected');
            } else {
                // 최대 선택 개수 제한
                if (userSelections[qId].length < required) {
                    userSelections[qId].push(optIndex);
                    btn.classList.add('selected');
                }
            }

            // 필요한 개수만큼 선택했다면 정답 공개
            if (userSelections[qId].length === required) {
                revealedQuestions.add(qId);
                setTimeout(renderQuiz, 300); // 부드러운 전환을 위해 약간의 지연 후 리렌더링
            }
        }

        // 페이지 변경
        function changePage(direction) {
            currentPage += direction;
            renderQuiz();
            window.scrollTo(0, 0);
        }

        // 첫 렌더링
        renderQuiz();

        // 맨 위로 가기 기능
        document.getElementById('scroll-top-btn').addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth' // 부드러운 스크롤
            });
        });

        // 맨 아래로 가기 기능
        document.getElementById('scroll-bottom-btn').addEventListener('click', () => {
            window.scrollTo({
                top: document.body.scrollHeight, // 문서 전체 높이만큼 스크롤
                behavior: 'smooth'
            });
        });
    </script>
