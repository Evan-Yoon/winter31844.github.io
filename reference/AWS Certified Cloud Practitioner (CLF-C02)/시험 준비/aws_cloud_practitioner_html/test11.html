<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Cloud Practitioner</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #2b2827;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #ffffff;
            text-align: center;
            border-bottom: 3px solid #ff9900;
            padding-bottom: 10px;
        }

        .question-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .question-header {
            color: orange;
            font-size: 1.5rem;
            font-weight: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #16191f;
        }

        .options-container {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background-color: #fff;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: left;
            cursor: pointer;
            font-size: 1rem;
            font-family: system-ui;
            font-weight: bold;
            transition: all 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #aaa;
        }

        .option-btn.selected {
            border-color: #ff9900;
            background-color: #fffaf0;
        }

        .option-btn.correct {
            background-color: #e7f4e4 !important;
            border-color: #2e7d32 !important;
            color: #1b5e20 !important;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: #fdecea !important;
            border-color: #d32f2f !important;
            color: #c62828 !important;
        }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            background-color: #fff9e6;
            border-left: 5px solid #ff9900;
            border-radius: 4px;
            display: none;
        }

        /* 페이지네이션 버튼 스타일 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .page-btn {
            padding: 10px 20px;
            background-color: #232f3e;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .page-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* 플로팅 버튼 공통 스타일 */
        .floating-btn {
            position: fixed;
            right: 30px;
            width: 50px;
            height: 50px;
            background-color: #ff9900;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 맨 위로 가는 버튼 위치 (오른쪽 위) */
        #scroll-top-btn {
            top: 30px;
        }

        /* 맨 아래로 가는 버튼 위치 (오른쪽 아래) */
        #scroll-bottom-btn {
            bottom: 30px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>AWS Cloud Practitioner Exam 11</h1>
        <div id="quiz-container"></div>

        <div class="pagination">
            <button class="page-btn" id="prev-btn" onclick="changePage(-1)">이전 페이지</button>
            <button class="page-btn" id="next-btn" onclick="changePage(1)">다음 페이지</button>
        </div>
    </div>

    <!-- 맨 위로 가기 버튼 -->
    <button id="scroll-top-btn" class="floating-btn" aria-label="맨 위로">↑</button>

    <!-- 맨 아래로 가기 버튼 -->
    <button id="scroll-bottom-btn" class="floating-btn" aria-label="맨 아래로">↓</button>

            },
            {
                id: 45,
                text: "어떤 시나리오에서 Amazon EC2 스팟 인스턴스를 사용해야 합니까?",
                required: 1,
                options: [
                    { text: "회사가 메인 웹사이트를 온프레미스에서 AWS로 이전할 때", isCorrect: false },

                    { text: "사용량이 많은 레거시 데이터베이스를 실행할 때", isCorrect: false },
                    { text: "중단 가능하고 자주 발생하지 않는 작업을 실행할 때", isCorrect: true }
                ],
                explanation: "스팟 인스턴스는 비용은 저렴하지만 AWS가 리소스를 회수할 때 중단될 수 있으므로, 배치 작업처럼 중단 가능한 업무에 적합합니다."
            },
            {
                id: 46,
                text: "고객이 애플리케이션을 배포할 AWS 리전을 선택할 때 영향을 미치는 요소는 무엇입니까? (2개 선택)",
                required: 2,
                options: [
                    { text: "사용자에 대한 지연 시간 단축", isCorrect: true },
                    { text: "현지 언어로 된 애플리케이션 표시 여부", isCorrect: false },
                    { text: "데이터 주권(Data sovereignty) 규정 준수", isCorrect: true },
                    { text: "더운 기후의 냉각 비용", isCorrect: false },
                    { text: "현장 방문을 위한 고객 사무실과의 근접성", isCorrect: false }
                ],
                explanation: "리전 선택 시 가장 중요한 기준은 법적 규제(데이터 위치)와 사용자와의 물리적 거리에 따른 지연 시간(Latency)입니다."
            },
            {

                required: 1,
                options: [
                    { text: "AWS Personal Health Dashboard", isCorrect: true },
                    { text: "AWS Service Health Dashboard", isCorrect: false },

                ],
                explanation: "Personal Health Dashboard는 고객의 특정 계정 및 리소스와 관련된 건강 상태와 알림을 제공합니다."
            },
            {
                id: 48,
                text: "다운타임(장애 시간) 가능성이 가장 낮은 재해 복구(DR) 시나리오는 무엇입니까?",
                required: 1,
                options: [
                    { text: "백업 및 복구 (Backup and restore)", isCorrect: false },
                    { text: "파일럿 라이트 (Pilot light)", isCorrect: false },
                    { text: "웜 스탠바이 (Warm standby)", isCorrect: false },
                    { text: "멀티 사이트 액티브-액티브 (Multi-site active-active)", isCorrect: true }
                ],
                explanation: "여러 사이트에서 동시에 트래픽을 처리하는 액티브-액티브 방식은 한쪽 사이트 장애 시 즉각 전환이 가능해 다운타임이 거의 없습니다."
            },
            {
                id: 49,
                text: "소프트웨어 버전 관리를 주요 목적으로 하는 서비스는?",
                required: 1,
                options: [
                    { text: "Amazon CodeStar", isCorrect: false },
                    { text: "AWS CLI", isCorrect: false },
                    { text: "Amazon Cognito", isCorrect: false },
                    { text: "AWS CodeCommit", isCorrect: true }
                ],
                explanation: "AWS CodeCommit은 Git 기반의 호스팅되는 보안 소스 제어 서비스입니다."
            },
            {
                id: 50,
                text: "고객이 AWS 계정 로그인의 보안을 강화할 수 있는 방법은 무엇입니까? (2개 선택)",
                required: 2,
                options: [
                    { text: "AWS Certificate Manager 구성", isCorrect: false },
                    { text: "다요소 인증 (MFA) 활성화", isCorrect: true },
                    { text: "Amazon Cognito를 사용하여 액세스 관리", isCorrect: false },
                    { text: "강력한 비밀번호 정책 구성", isCorrect: true },
                    { text: "AWS Organizations 활성화", isCorrect: false }
                ],
                explanation: "MFA와 강력한 비밀번호 정책은 사용자 계정 보안을 유지하기 위한 가장 핵심적인 설정입니다."
            }
        ];

        // 상태 관리
        let currentPage = 1;
        const questionsPerPage = 10;
        const userSelections = {}; // 유저가 선택한 버튼 인덱스 저장
        const revealedQuestions = new Set(); // 정답이 공개된 문제 번호 저장

        // 배열 섞기 함수 (Fisher-Yates)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 초기 실행: 각 문제의 보기를 무작위로 섞음
        questionsData.forEach(q => {
            shuffleArray(q.options);
        });

        // 퀴즈 렌더링 함수
        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            const start = (currentPage - 1) * questionsPerPage;
            const end = start + questionsPerPage;
            const currentQuestions = questionsData.slice(start, end);

            currentQuestions.forEach((q, qIndex) => {
                const absoluteIndex = start + qIndex;
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q-${q.id}`;

                const isRevealed = revealedQuestions.has(q.id);

                // 헤더
                const header = document.createElement('div');
                header.className = 'question-header';
                header.innerHTML = `<span>🍧 문제 ${q.id}</span>`;
                card.appendChild(header);

                // 질문
                const text = document.createElement('div');
                text.className = 'question-text';
                text.innerText = q.text;
                card.appendChild(text);

                // 보기 컨테이너
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options-container';

                const labels = ['A', 'B', 'C', 'D', 'E'];
                q.options.forEach((opt, optIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = `${labels[optIndex]}. ${opt.text}`;

                    // 이미 선택했거나 공개된 상태에 따른 스타일 적용
                    if (userSelections[q.id] && userSelections[q.id].includes(optIndex)) {
                        btn.classList.add('selected');
                    }

                    if (isRevealed) {
                        btn.disabled = true;
                        if (opt.isCorrect) btn.classList.add('correct');
                        else if (userSelections[q.id] && userSelections[q.id].includes(optIndex)) {
                            btn.classList.add('wrong');
                        }
                    } else {
                        btn.onclick = () => handleSelect(btn, q.id, optIndex, q.required);
                    }

                    optionsDiv.appendChild(btn);
                });
                card.appendChild(optionsDiv);

                // 해설
                const exp = document.createElement('div');
                exp.className = 'explanation';
                exp.id = `exp-${q.id}`;
                exp.innerHTML = `<span class="correct-label">해설:</span>${q.explanation}`;
                if (isRevealed) exp.style.display = 'block';
                card.appendChild(exp);

                container.appendChild(card);
            });

            // 버튼 상태 업데이트
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = end >= questionsData.length;
        }

        // 보기 선택 처리
        function handleSelect(btn, qId, optIndex, required) {
            if (!userSelections[qId]) userSelections[qId] = [];

            // 이미 선택된 것이면 취소 (다중 선택일 경우 대비)
            if (userSelections[qId].includes(optIndex)) {
                userSelections[qId] = userSelections[qId].filter(i => i !== optIndex);
                btn.classList.remove('selected');
            } else {
                // 최대 선택 개수 제한
                if (userSelections[qId].length < required) {
                    userSelections[qId].push(optIndex);
                    btn.classList.add('selected');
                }
            }

            // 필요한 개수만큼 선택했다면 정답 공개
            if (userSelections[qId].length === required) {
                revealedQuestions.add(qId);
                setTimeout(renderQuiz, 300); // 부드러운 전환을 위해 약간의 지연 후 리렌더링
            }
        }

        // 페이지 변경
        function changePage(direction) {
            currentPage += direction;
            renderQuiz();
            window.scrollTo(0, 0);
        }

        // 첫 렌더링
        renderQuiz();

        // 맨 위로 가기 기능
        document.getElementById('scroll-top-btn').addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth' // 부드러운 스크롤
            });
        });

        // 맨 아래로 가기 기능
        document.getElementById('scroll-bottom-btn').addEventListener('click', () => {
            window.scrollTo({
                top: document.body.scrollHeight, // 문서 전체 높이만큼 스크롤
                behavior: 'smooth'
            });
        });
    </script>
