        { q: "39. 사전 훈련된 모델의 가중치를 미세 조정할 때, 학습률(Learning Rate)이 너무 크면 발생하는 현상은?", options: ["학습이 전혀 이루어지지 않는다.", "최적의 가중치를 지나치게 되어(Overshooting) 손실이 발산하거나 수렴하지 않는다.", "모델이 훈련 데이터에 완벽하게 과대적합된다.", "훈련 속도가 기하급수적으로 느려진다."], answer: 1, explanation: "학습률이 너무 높으면 경사 하강법 과정에서 최적점을 건너뛰어 손실값이 줄어들지 않고 오히려 증가하거나 진동하는 발산 현상이 발생할 수 있습니다." },
        { q: "40. 생성형 AI 시스템 개발 시, 고객이 명시적으로 동의하지 않는 한 고객 데이터를 모델 학습에 사용하지 않는 옵션 설정(Opt-out) 기능이 중요한 이유는?", options: ["데이터 저장 비용을 줄이기 위해", "데이터 프라이버시 및 규정 준수(예: GDPR) 보장", "모델 추론 속도를 높이기 위해", "네트워크 대역폭 최적화를 위해"], answer: 1, explanation: "고객 데이터의 프라이버시를 보호하고 법적 규제를 준수하기 위해서는 민감한 데이터가 타사 모델 학습에 사용되지 않도록 제어할 수 있어야 합니다." },
        { q: "41. AWS에서 제공하는 완전 관리형 기계 학습 플랫폼으로, 데이터 준비부터 모델 구축, 훈련, 배포까지 전 주기를 지원하는 서비스는?", options: ["Amazon ECS", "AWS Glue", "Amazon SageMaker", "Amazon EMR"], answer: 2, explanation: "Amazon SageMaker는 모든 개발자 및 데이터 과학자가 기계 학습 모델을 빠르게 구축, 훈련 및 배포할 수 있도록 하는 완전 관리형 서비스입니다." },
        { q: "42. 비정형 텍스트에서 의료 정보(예: 진단명, 약물 이름, 복용량)를 안전하게 추출하도록 사전 훈련된 NLP 서비스는?", options: ["Amazon Comprehend", "Amazon Comprehend Medical", "Amazon HealthLake", "Amazon Macie"], answer: 1, explanation: "Amazon Comprehend Medical은 HIPAA 규정을 준수하며 의료 텍스트에서 건강 관련 정보를 구문 분석하고 추출하도록 특별히 설계된 NLP 서비스입니다." },
        { q: "43. 트랜스포머(Transformer) 아키텍처가 기존의 순환 신경망(RNN)에 비해 텍스트 처리에 있어 가지는 가장 큰 장점은 무엇인가?", options: ["연산에 필요한 메모리가 거의 없다.", "시계열 데이터를 순차적으로만 처리하여 병목이 없다.", "어텐션 메커니즘을 통해 문장 내 모든 단어의 관계를 병렬로 처리하여 속도가 빠르다.", "학습 데이터가 100개 미만이어도 높은 성능을 낸다."], answer: 2, explanation: "트랜스포머 아키텍처의 Self-Attention 메커니즘은 문장의 모든 단어를 병렬 연산으로 한 번에 처리할 수 있어, 순차 처리로 인해 느렸던 RNN의 한계를 극복했습니다." },
        { q: "44. 다음 중 '지도 학습(Supervised Learning)' 알고리즘에 해당하는 것은?", options: ["K-평균 군집화 (K-Means Clustering)", "주성분 분석 (PCA)", "선형 회귀 (Linear Regression)", "이상 탐지 (Anomaly Detection)"], answer: 2, explanation: "선형 회귀는 입력 피처를 기반으로 연속적인 숫자 값을 예측하는 알고리즘으로, 정답(레이블)이 있는 데이터를 사용하는 지도 학습의 대표적인 예입니다." },
        { q: "45. 사용자가 Amazon Bedrock 모델의 응답에 불만을 가지고 있다. 출력의 형식을 특정 JSON 구조로 강제하고 싶을 때 가장 먼저 시도해야 할 방법은?", options: ["파운데이션 모델을 미세 조정(Fine-tuning)한다.", "프롬프트에 원하는 JSON 출력 예시를 명확히 제시한다(프롬프트 엔지니어링).", "더 크고 비싼 모델로 교체한다.", "온도(Temperature)를 1로 설정한다."], answer: 1, explanation: "대규모 모델의 행동이나 출력 형식을 조정할 때 가장 비용 효율적이고 빠른 첫 번째 접근법은 프롬프트 엔지니어링을 통해 지시 사항과 예시를 구체적으로 제공하는 것입니다." },
        { q: "46. AWS 환경에서 사용자 애플리케이션이 악의적인 트래픽이나 SQL 인젝션 공격 등으로부터 생성형 AI API를 보호하기 위해 웹 계층에 배포해야 하는 서비스는?", options: ["AWS WAF", "Amazon GuardDuty", "AWS Secrets Manager", "Amazon Inspector"], answer: 0, explanation: "AWS WAF(Web Application Firewall)는 SQL 인젝션, 크로스 사이트 스크립팅(XSS)과 같은 일반적인 웹 공격으로부터 웹 애플리케이션 및 API를 보호합니다." },
        { q: "47. Amazon Personalize를 사용하여 얻을 수 있는 주요 비즈니스 이점은 무엇인가?", options: ["자동화된 세금 계산", "실시간 비디오 트랜스코딩", "전자상거래 웹사이트의 개인화된 상품 추천", "데이터베이스 자동 백업"], answer: 2, explanation: "Amazon Personalize는 Amazon.com에서 사용하는 것과 동일한 기계 학습 기술을 사용하여 실시간 맞춤형 추천 시스템을 생성하는 서비스입니다." },
        { q: "48. 모델 평가 지표 중, 불균형한 데이터세트(예: 스팸 1%, 정상 99%)에서 '정확도(Accuracy)'만을 지표로 삼는 것이 부적절한 이유는?", options: ["계산이 너무 복잡하기 때문이다.", "모델이 무조건 다수 클래스(예: 정상)로만 예측해도 99%의 정확도가 나오므로 모델의 실제 예측력을 판단할 수 없다.", "정확도는 회귀 분석에만 사용되는 지표이기 때문이다.", "정확도는 항상 0과 1 사이의 값이 아니기 때문이다."], answer: 1, explanation: "데이터가 극도로 불균형할 경우, 모델이 아무 학습 없이 무조건 다수결로만 예측해도 겉보기 정확도가 매우 높아지는 착시 현상이 발생하므로, 정밀도(Precision), 재현율(Recall), F1 점수 등을 함께 봐야 합니다." },
        { q: "49. AI 파운데이션 모델 추론(Inference) 워크로드에 특화되어 설계되었으며 클라우드에서 가장 비용 효율적인 기계 학습 추론을 제공하는 AWS 실리콘은?", options: ["AWS Graviton", "AWS Trainium", "AWS Inferentia", "Intel Xeon"], answer: 2, explanation: "AWS Inferentia는 고성능 딥 러닝 추론(Inference) 애플리케이션을 위해 최상의 가성비를 제공하도록 AWS에서 자체 설계한 칩입니다." },
        { q: "50. Amazon SageMaker JumpStart의 주요 이점은 무엇인가?", options: ["서버리스 데이터베이스 자동화", "수백 개의 사전 훈련된 최신 파운데이션 모델과 솔루션 템플릿을 제공하여 AI 구축을 가속화", "EC2 인스턴스의 자동 확장", "웹 도메인 등록 자동화"], answer: 1, explanation: "SageMaker JumpStart는 공개적으로 사용 가능한 사전 훈련된 모델(Llama, Mistral 등)의 허브 역할을 하며, 단 몇 번의 클릭으로 인프라에 모델을 배포하거나 미세 조정할 수 있습니다." },
        { q: "51. 기업이 생성형 AI 애플리케이션을 외부 고객에게 서비스하려고 한다. 부적절한 사용자 입력(프롬프트 인젝션)을 방지하기 위해 Amazon Bedrock에서 설정할 수 있는 기능은?", options: ["VPC 보안 그룹", "Bedrock Guardrails 프롬프트 공격 필터", "AWS CloudTrail", "IAM 역할"], answer: 1, explanation: "Amazon Bedrock Guardrails는 입력(프롬프트)에 포함된 악의적인 탈옥(Jailbreak) 시도나 프롬프트 인젝션을 감지하고 차단하는 기능을 제공합니다." },
        { q: "52. Amazon Q Business 애플리케이션에서 인덱싱된 사내 문서에 접근할 때 데이터 보안은 어떻게 보장되는가?", options: ["모든 사용자가 모든 문서에 접근할 수 있다.", "엔터프라이즈의 기존 자격 증명 및 권한(ACL)을 인식하여, 질문한 사용자가 열람 권한을 가진 문서의 내용만 활용하여 답변한다.", "데이터베이스 암호화를 해제해야 검색이 가능하다.", "문서를 외부 퍼블릭 클라우드에 복사한다."], answer: 1, explanation: "Amazon Q는 기업의 권한 시스템(IAM, SSO 기반 ACL)을 준수하므로, 사용자는 본인에게 접근 권한이 있는 데이터 시스템과 문서만을 기반으로 생성된 답변을 받게 됩니다." },
        { q: "53. 프롬프트 엔지니어링의 CoT(Chain-of-Thought) 기법을 가장 잘 설명한 것은?", options: ["수백 개의 예제를 입력하는 것", "모델에게 중간 논리적 추론 단계를 명시적으로 작성하거나 거치도록 지시하여 복잡한 문제 해결 능력을 높이는 것", "온도를 0으로 설정하는 것", "단어를 토큰으로 분해하는 것"], answer: 1, explanation: "Chain-of-Thought(생각의 사슬) 프롬프팅은 모델에게 '단계별로 생각해보자(Let's think step by step)'와 같이 지시하여 최종 답을 도출하기까지의 논리적 과정을 풀어서 설명하게 만들어 정확도를 높이는 방법입니다." },
        { q: "54. 기계 학습에서 '비지도 학습(Unsupervised Learning)'의 주요 목적은 무엇인가?", options: ["과거 데이터를 바탕으로 미래 수치 예측", "레이블이 없는 데이터 내에서 숨겨진 패턴, 구조, 또는 데이터의 군집(Cluster)을 찾는 것", "게임 환경에서 보상을 최대화하는 행동 학습", "입력 데이터에 정답 레이블을 할당하는 것"], answer: 1, explanation: "비지도 학습은 정답(레이블)이 없는 데이터 세트에서 데이터 간의 유사성을 바탕으로 클러스터링(군집화)을 하거나 차원을 축소하는 등 숨겨진 구조를 찾아내는 데 사용됩니다." },
        { q: "55. 한 글로벌 이커머스 회사에서 제품 리뷰를 여러 언어로 제공하려고 한다. 배치 및 실시간으로 텍스트를 고품질로 자동 번역하는 빠르고 비용 효율적인 AWS 서비스는?", options: ["Amazon Comprehend", "Amazon Translate", "Amazon Transcribe", "Amazon Lex"], answer: 1, explanation: "Amazon Translate는 고급 기계 학습 기술을 사용하여 빠르고 고품질의 자동 언어 번역을 제공하는 신경망 기계 번역 서비스입니다." },
        { q: "56. 모델 훈련 과정을 완료하고 배포한 후, 시간이 지남에 따라 실제 환경의 데이터 분포가 훈련 데이터 분포와 달라지면서 모델의 예측 성능이 저하되는 현상을 무엇이라고 하는가?", options: ["데이터 증강 (Data Augmentation)", "과소적합 (Underfitting)", "데이터 편향 (Data Bias)", "데이터/모델 드리프트 (Data/Model Drift)"], answer: 3, explanation: "데이터 드리프트(Data Drift) 또는 모델 드리프트는 실제 세계의 환경 변화로 인해 서비스 중인 모델에 입력되는 데이터의 특성이 훈련 시점과 달라져 모델 성능이 떨어지는 현상을 말합니다." },
        { q: "57. Amazon Bedrock에서 파운데이션 모델을 미세 조정할 때(Fine-tuning), 생성되는 사용자 지정 모델 자산은 어디에 저장되는가?", options: ["퍼블릭 인터넷의 오픈 소스 저장소", "해당 AWS 계정의 격리된 프라이빗 환경 내", "모델 제공업체(예: Anthropic)의 자체 서버", "AWS 글로벌 공용 스토리지"], answer: 1, explanation: "Amazon Bedrock에서 고객 데이터로 파운데이션 모델을 미세 조정하면, 해당 모델 복사본과 가중치는 고객의 자체 VPC/AWS 계정에 프라이빗하게 보관되며 다른 고객이나 AWS와 공유되지 않습니다." },
        { q: "58. AWS 클라우드 워크로드에 대한 퍼블릭 인터넷 노출을 방지하기 위해, 인터넷 게이트웨이를 통하지 않고 Amazon VPC에서 지원되는 AWS 서비스(예: S3, Bedrock)로 사설 네트워크를 통해 직접 연결하는 기능은?", options: ["AWS WAF", "AWS VPC 엔드포인트 (AWS PrivateLink)", "Amazon CloudFront", "AWS Direct Connect"], answer: 1, explanation: "VPC 엔드포인트(AWS PrivateLink 지원)를 사용하면 퍼블릭 인터넷, NAT 게이트웨이 등을 거치지 않고 AWS 백본 네트워크 내에서 안전하게 AWS 서비스 API를 호출할 수 있습니다." },
        { q: "59. 대규모 언어 모델이 학습하는 데이터의 기본 단위로, 단어나 단어의 일부분(음절 단위 등)을 숫자로 매핑한 것을 무엇이라 부르는가?", options: ["파라미터 (Parameter)", "토큰 (Token)", "배치 (Batch)", "텐서 (Tensor)"], answer: 1, explanation: "토큰(Token)은 자연어 처리에서 모델이 텍스트를 처리하는 기본 단위로, 단어 하나일 수도 있고 단어의 부분, 혹은 한 글자일 수도 있습니다. 모델의 과금 단위로도 쓰입니다." },
        { q: "60. 다음 중 Amazon Bedrock의 Agent(에이전트) 기능이 수행하는 주요 역할은 무엇인가?", options: ["비용 청구서 자동 발행", "데이터베이스의 자동 확장 설정", "대화형 프롬프트를 바탕으로 사용자의 의도를 분석하고, 필요한 API를 자율적으로 호출하여 다단계 비즈니스 작업을 수행", "EC2 인스턴스의 트래픽 로드 밸런싱"], answer: 2, explanation: "Amazon Bedrock Agents는 대규모 언어 모델의 추론 능력을 활용하여 사용자의 복잡한 요청을 분석하고, 이를 여러 단계로 분해한 후 회사 시스템(API) 및 데이터 소스와 상호 작용하여 작업을 자율적으로 실행합니다." }
    ];

    const quizContainer = document.getElementById('quiz-container');

    // 퀴즈 렌더링 함수
    function renderQuiz() {
        let html = '';
        questionsData.forEach((qObj, index) => {
            html += `
                <div class="question-block" id="q-block-${index}">
                    <div class="question-text">${qObj.q}</div>
                    <ul class="options-list">
            `;
            qObj.options.forEach((opt, optIndex) => {
                // 다중 선택(배열)인지 단일 선택인지 확인
                const isMultiple = Array.isArray(qObj.answer);
                const inputType = isMultiple ? 'checkbox' : 'radio';
                const inputName = `q${index}`;
                
                html += `
                        <li class="option-item" id="opt-label-${index}-${optIndex}">
                            <label style="display: block; cursor: pointer;">
                                <input type="${inputType}" name="${inputName}" value="${optIndex}">
                                ${String.fromCharCode(65 + optIndex)}. ${opt}
                            </label>
                        </li>
                `;
            });
            html += `
                    </ul>
                    <div class="explanation" id="exp-${index}">
                        <strong>해설:</strong> ${qObj.explanation}
                    </div>
                </div>
            `;
        });
        quizContainer.innerHTML = html;
    }

    // 채점 로직
    function submitQuiz() {
        let score = 0;
        const total = questionsData.length;

        questionsData.forEach((qObj, index) => {
            const isMultiple = Array.isArray(qObj.answer);
            const inputs = document.querySelectorAll(`input[name="q${index}"]`);
            let userAnswers = [];

            inputs.forEach(input => {
                if (input.checked) {
                    userAnswers.push(parseInt(input.value));
                }
            });

            let isCorrect = false;

            if (isMultiple) {
                // 다중 선택 정답 체크
                const correctAnswers = qObj.answer.slice().sort();
                userAnswers.sort();
                if (userAnswers.length === correctAnswers.length && 
                    userAnswers.every((val, i) => val === correctAnswers[i])) {
                    isCorrect = true;
                }
            } else {
                // 단일 선택 정답 체크
                if (userAnswers.length === 1 && userAnswers[0] === qObj.answer) {
                    isCorrect = true;
                }
            }

            if (isCorrect) {
                score++;
                document.getElementById(`q-block-${index}`).style.borderLeft = "5px solid #28a745";
                document.getElementById(`q-block-${index}`).style.paddingLeft = "10px";
            } else {
                document.getElementById(`q-block-${index}`).style.borderLeft = "5px solid #dc3545";
                document.getElementById(`q-block-${index}`).style.paddingLeft = "10px";
            }

            // 정답 하이라이트 표시
            if (isMultiple) {
                qObj.answer.forEach(ans => {
                    document.getElementById(`opt-label-${index}-${ans}`).classList.add('correct-answer');
                });
            } else {
                document.getElementById(`opt-label-${index}-${qObj.answer}`).classList.add('correct-answer');
            }

            // 사용자 오답 표시 (선택한 것 중 틀린 것)
            userAnswers.forEach(ans => {
                if (isMultiple && !qObj.answer.includes(ans)) {
                    document.getElementById(`opt-label-${index}-${ans}`).classList.add('wrong-answer');
                } else if (!isMultiple && ans !== qObj.answer) {
                    document.getElementById(`opt-label-${index}-${ans}`).classList.add('wrong-answer');
                }
            });

            // 해설 보이기
            document.getElementById(`exp-${index}`).style.display = 'block';
        });

        const resultContainer = document.getElementById('result-container');
        resultContainer.style.display = 'block';
        const percent = Math.round((score / total) * 100);
        let msg = percent >= 70 ? "🎉 합격 가능성이 높습니다!" : "💪 조금 더 복습이 필요합니다!";
        resultContainer.innerHTML = `총 ${total}문제 중 <strong>${score}문제</strong> 맞췄습니다. (정답률: ${percent}%)<br>${msg}`;
        
        // 최상단으로 스크롤 이동하여 결과 보여주기
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 초기화
    renderQuiz();
</script>
