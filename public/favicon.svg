<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BAFBA"/>
      <stop offset="100%" stop-color="#2A6B7C"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4B483"/>
      <stop offset="100%" stop-color="#B8944F"/>
    </linearGradient>
  </defs>

  <!-- 배경 원 -->
  <circle cx="50" cy="50" r="50" fill="#F5F4EF"/>

  <!-- 외곽 링 -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#teal)" stroke-width="4.5"/>

  <!-- E: 세로획 -->
  <rect x="18" y="28" width="4.5" height="44" rx="2" fill="url(#teal)"/>
  <!-- E: 상단 가로획 -->
  <rect x="18" y="28" width="22" height="4.5" rx="2" fill="url(#teal)"/>
  <!-- E: 중단 가로획 -->
  <rect x="18" y="47.5" width="17" height="4.5" rx="2" fill="url(#teal)"/>
  <!-- E: 하단 가로획 -->
  <rect x="18" y="67.5" width="22" height="4.5" rx="2" fill="url(#teal)"/>

  <!-- Y: 좌측 대각선 -->
  <line x1="50" y1="28" x2="64" y2="50" stroke="url(#teal)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Y: 우측 대각선 -->
  <line x1="78" y1="28" x2="64" y2="50" stroke="url(#teal)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Y: 세로 줄기 -->
  <line x1="64" y1="50" x2="64" y2="72" stroke="url(#teal)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- 골드 대각선 슬래시 -->
  <line x1="36" y1="20" x2="74" y2="80" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
</svg>
